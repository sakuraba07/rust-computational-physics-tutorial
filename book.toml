[book]
title = "rust計算物理学チュートリアル"
authors = ["sakuraba07"]
language = "ja"
src = "src"

[preprocessor.mermaid]

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0"  # do not edit: managed by `mdbook-admonish install`

[output.html]
additional-css = ["./mdbook-admonish.css"]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/sakuraba07/rust-computational-physics-tutorial"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/sakuraba07/rust-computational-physics-tutorial/edit/main/src/{path}"

[output.typst]
