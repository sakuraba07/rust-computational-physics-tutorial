        <script>
            // Pagefindの初期化を遅延実行
            function initializePagefind() {
                // Find the menu bar
                const menuBar = document.querySelector('#menu-bar');
                if (!menuBar) {
                    console.warn('Menu bar not found');
                    return;
                }
                
                // Create search container
                const searchContainer = document.createElement('div');
                searchContainer.id = 'pagefind-search-container';
                searchContainer.innerHTML = '<div id="pagefind-search"></div>';
                
                // Insert before the right buttons
                const rightButtons = menuBar.querySelector('.right-buttons');
                if (rightButtons) {
                    menuBar.insertBefore(searchContainer, rightButtons);
                } else {
                    menuBar.appendChild(searchContainer);
                }
                
                // Load Pagefind UI script
                const script = document.createElement('script');
                script.src = '../pagefind/pagefind-ui.js';
                script.onload = function() {
                    // Initialize Pagefind UI after script loads
                    if (typeof PagefindUI !== 'undefined') {
                        new PagefindUI({ 
                            element: "#pagefind-search",
                            showSubResults: true,
                            resetStyles: false,
                            translations: {
                                placeholder: "検索...",
                                clear_search: "クリア",
                                load_more: "さらに読み込む",
                                search_label: "このサイトを検索",
                                filters_label: "フィルター",
                                zero_results: "[SEARCH_TERM] に一致する結果が見つかりませんでした",
                                many_results: "[COUNT] 件の結果",
                                one_result: "1 件の結果",
                                alt_search: "[SEARCH_TERM] に一致する結果が見つかりませんでした。代わりに [DIFFERENT_TERM] の結果を表示しています",
                                search_suggestion: "[TERM] を検索してみてください",
                                searching: "検索中..."
                            }
                        });
                        
                        // Close search results when clicking outside
                        document.addEventListener('click', function(event) {
                            const searchContainer = document.getElementById('pagefind-search-container');
                            if (searchContainer && !searchContainer.contains(event.target)) {
                                const resultsArea = document.querySelector('.pagefind-ui__results-area');
                                if (resultsArea) {
                                    resultsArea.style.display = 'none';
                                }
                            }
                        });
                        
                        // Show results area when input is focused and has content
                        const searchInput = document.querySelector('.pagefind-ui__search-input');
                        if (searchInput) {
                            searchInput.addEventListener('focus', function() {
                                const resultsArea = document.querySelector('.pagefind-ui__results-area');
                                if (resultsArea && searchInput.value.trim() !== '') {
                                    resultsArea.style.display = 'block';
                                }
                            });
                            
                            searchInput.addEventListener('input', function() {
                                const resultsArea = document.querySelector('.pagefind-ui__results-area');
                                if (resultsArea) {
                                    if (searchInput.value.trim() !== '') {
                                        resultsArea.style.display = 'block';
                                    } else {
                                        resultsArea.style.display = 'none';
                                    }
                                }
                            });
                        }
                    } else {
                        console.error('PagefindUI failed to load');
                    }
                };
                script.onerror = function() {
                    console.error('Failed to load Pagefind UI script');
                };
                document.head.appendChild(script);
            }
            
            // Wait for DOM to be ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializePagefind);
            } else {
                initializePagefind();
            }
        </script>
